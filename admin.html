<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVSTAR 后台数据管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#000;min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:#000;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.topbar-title{font-size:14px;font-weight:500;letter-spacing:.06em;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:220px;background:#fff;border-right:1px solid #e5e5e5;overflow-y:auto;padding:16px 0;}
.sidebar-item{padding:10px 24px;cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .15s;}
.sidebar-item:hover{background:#f5f5f5;}
.sidebar-item.active{border-left-color:#000;font-weight:500;background:#f9f9f9;}
.sidebar-sep{height:1px;background:#e5e5e5;margin:8px 0;}
.main{margin-left:220px;padding:28px 32px;min-height:calc(100vh - 56px);}
.btn{padding:8px 18px;border:1px solid #000;background:#fff;color:#000;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.btn:hover{background:#000;color:#fff;}
.btn-primary{background:#000;color:#fff;}
.btn-primary:hover{background:#333;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-danger{border-color:#c00;color:#c00;}
.btn-danger:hover{background:#c00;color:#fff;}
.btn-icon{width:26px;height:26px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;transition:all .15s;}
.btn-icon:hover{border-color:#000;}
.card{background:#fff;border:1px solid #e5e5e5;padding:18px 20px;margin-bottom:12px;position:relative;transition:border-color .15s;}
.card:hover{border-color:#ccc;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.card-title{font-size:14px;font-weight:500;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid #ddd;font-size:13px;font-family:'Inter',sans-serif;background:#fff;transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#000;}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;margin-bottom:0;}
.img-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.img-thumb{position:relative;width:72px;height:60px;border:1px solid #e5e5e5;overflow:hidden;}
.img-thumb img{width:100%;height:100%;object-fit:contain;}
.img-thumb .del-img{position:absolute;top:1px;right:1px;width:15px;height:15px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.content-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.content-row:last-child{border-bottom:none;}
.content-row .qty-inp{width:60px;padding:3px 6px;border:1px solid #ddd;font-size:13px;text-align:center;font-family:'Inter',sans-serif;}
.content-row .qty-inp:focus{outline:none;border-color:#000;}
.attach-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid #f5f5f5;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal-box{background:#fff;max-width:700px;margin:40px auto;padding:28px;position:relative;}
.modal-title{font-size:1.15rem;font-weight:300;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #e5e5e5;}
.modal-close{position:absolute;top:14px;right:16px;border:none;background:none;font-size:22px;cursor:pointer;color:#888;}
.modal-close:hover{color:#000;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #e5e5e5;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.section-title{font-size:1.05rem;font-weight:300;}
.section-sub{font-size:12px;color:#888;margin-top:2px;}
.empty{text-align:center;padding:48px;color:#bbb;font-size:13px;}
#toast{position:fixed;bottom:22px;right:22px;background:#000;color:#fff;padding:10px 20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;}
#js-err{display:none;position:fixed;top:56px;left:0;right:0;background:#c00;color:#fff;padding:10px 20px;font-size:12px;z-index:9000;word-break:break-all;}
</style>
</head>
<body>
<div id="toast"></div>
<div id="js-err"></div>

<div class="topbar">
  <span class="topbar-title">&#9881; PVSTAR 后台数据管理</span>
  <div class="topbar-actions">
    <button class="btn btn-sm" style="border-color:#555;color:#ccc;background:transparent;" onclick="exportDB()">&#8595; 导出 JSON</button>
    <label class="btn btn-sm" style="border-color:#555;color:#ccc;background:transparent;cursor:pointer;">

<script>
// ── Global error catcher ──
window.onerror = function(msg, src, line) {
  var el = document.getElementById('js-err');
  if (el) { el.style.display = 'block'; el.textContent = 'JS Error: ' + msg + ' (' + src + ':' + line + ')'; }
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('js-err');
  if (el) { el.style.display = 'block'; el.textContent = 'Async Error: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)); }
});
// ════════════════════════════════════════════
//  IndexedDB storage (replaces localStorage)
//  No size limit for images
// ════════════════════════════════════════════
const IDB_NAME  = 'pvstar_app';
const IDB_VER   = 1;
const IDB_STORE = 'pvstar_data';
const IDB_KEY   = 'main';
const LS_LEGACY = 'pvstar_db'; // for one-time migration

const DEFAULT_DB = {
  accessories: [
    {id:'acc_rail',      partNo:'',nameZh:'导轨',      nameEn:'Rail',          imgKey:'p_rail',       images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_hook',      partNo:'',nameZh:'挂钩',      nameEn:'Hook',          imgKey:'p_hook',       images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_end_clamp', partNo:'',nameZh:'边压块',    nameEn:'End Clamp',     imgKey:'p_end_clamp',  images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_mid_clamp', partNo:'',nameZh:'中压块',    nameEn:'Mid Clamp',     imgKey:'p_inter_clamp',images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_rail_conn', partNo:'',nameZh:'导轨连接件',nameEn:'Rail Connector',imgKey:'p_rail_conn',  images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_rail_cap',  partNo:'',nameZh:'导轨端盖',  nameEn:'Rail End Cap',  imgKey:'p_rail_cap',   images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_washer',    partNo:'',nameZh:'穿刺垫片',  nameEn:'Grounding Clip',imgKey:'pp_washer',    images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_cable_clip',partNo:'',nameZh:'线夹',      nameEn:'Cable Clip',    imgKey:'pp_cable_clip',images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
    {id:'acc_grnd_lug',  partNo:'',nameZh:'接地块',    nameEn:'Grounding Lug', imgKey:'pp_grnd_lug',  images:[],weight:0,price:0,description:'',brand:'',attachments:[]},
  ],
  packages: [
    {id:'pkg_rail',     sku:'8061010000018',nameZh:'导轨包',  nameEn:'Rail Pack',     imgKey:'pp_rail',     images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:4, calcFrom:'rails',        contents:[{accessoryId:'acc_rail',     qty:4}]},
    {id:'pkg_hook',     sku:'8061020000007',nameZh:'挂钩包',  nameEn:'Hook Pack',     imgKey:'pp_hook',     images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:20,calcFrom:'hooks',        contents:[{accessoryId:'acc_hook',     qty:20}]},
    {id:'pkg_end_clamp',sku:'8061030000013',nameZh:'边压块包',nameEn:'End Clamp Pack',imgKey:'pp_end_clamp',images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:20,calcFrom:'endClamps',    contents:[{accessoryId:'acc_end_clamp',qty:20},{accessoryId:'acc_washer',   qty:20}]},
    {id:'pkg_mid_clamp',sku:'8061040000013',nameZh:'中压块包',nameEn:'Mid Clamp Pack',imgKey:'pp_mid_clamp',images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:20,calcFrom:'midClamps',    contents:[{accessoryId:'acc_mid_clamp',qty:20},{accessoryId:'acc_washer',   qty:20},{accessoryId:'acc_cable_clip',qty:20}]},
    {id:'pkg_connector',sku:'8061050000017',nameZh:'连接件包',nameEn:'Connector Pack',imgKey:'pp_connector',images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:10,calcFrom:'railConnectors',contents:[{accessoryId:'acc_rail_conn',qty:10}]},
    {id:'pkg_accessory',sku:'8061080000008',nameZh:'配件包',  nameEn:'Accessory Pack',imgKey:'pp_accessory',images:[],weight:0,dimensions:'',price:0,description:'',brand:'',packSize:10,calcFrom:'leftEndCaps',  contents:[{accessoryId:'acc_rail_cap', qty:10},{accessoryId:'acc_grnd_lug',  qty:6}]},
  ]

// ── IndexedDB open (promise singleton — safe for concurrent calls) ──
let _idbPromise = null;
function openIDB() {
  if (!_idbPromise) {
    _idbPromise = new Promise(function(resolve, reject) {
      var req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror   = function(e) { _idbPromise = null; reject(e.target.error); };
    });
  }
  return _idbPromise;
}

async function loadDB() {
  var idb = await openIDB();
  return new Promise(function(resolve) {
    var req = idb.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY);
    req.onsuccess = function(e) {
      var d = e.target.result;
      // Strict validation: must have non-empty accessories array and packages array
      if (d && Array.isArray(d.accessories) && d.accessories.length > 0 && Array.isArray(d.packages)) {
        resolve(d);
      } else {
        resolve(JSON.parse(JSON.stringify(DEFAULT_DB)));
      }
    };
    req.onerror = function() { resolve(JSON.parse(JSON.stringify(DEFAULT_DB))); };
  });
}

async function saveDB(db) {
  try {
    var idb = await openIDB();
    await new Promise(function(resolve, reject) {
      var req = idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(db, IDB_KEY);
      req.onsuccess = function() { resolve(); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
    return true;
  } catch(e) {
    showToast('保存失败: ' + e.message, 1);
    return false;
  }
}

// ── Migrate legacy localStorage data (one-time) ──
async function migrateLegacyData() {
  try {
    var raw = localStorage.getItem(LS_LEGACY);
    if (!raw) return;
    var parsed = JSON.parse(raw);
    // Reject empty or invalid legacy data
    if (!parsed || !Array.isArray(parsed.accessories) || parsed.accessories.length === 0 ||
        !Array.isArray(parsed.packages) || parsed.packages.length === 0) {
      localStorage.removeItem(LS_LEGACY);
      return;
    }
    var existing = await loadDB();
    // Only migrate if IDB still has default (no custom data yet)
    var isDefault = existing.accessories.every(function(a) {
      return !a.partNo && !a.images.length && !a.price && !a.weight;
    });
    if (isDefault) {
      await saveDB(parsed);
      showToast('已自动将旧数据迁移到 IndexedDB');
    }
    localStorage.removeItem(LS_LEGACY);
  } catch(e) { /* ignore migration errors */ }
}

function uid(){return '_'+Math.random().toString(36).substr(2,9);}

let _toastT;
function showToast(msg,err){var el=document.getElementById('toast');el.textContent=msg;el.style.background=err?'#c00':'#000';el.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(function(){el.classList.remove('show');},3000);}

function showTab(name){
  ['acc','pkg','io'].forEach(function(t){
    document.getElementById('panel-'+t).style.display=t===name?'':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
  if(name==='acc')renderAccList();
  if(name==='pkg')renderPkgList();
}

/* ── Image compression (Canvas, max 600×500 JPEG 0.78) ── */
function compressImage(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url);
      var MW=600,MH=500,Q=0.78,w=img.width,h=img.height;
      if(w>MW){h=Math.round(h*MW/w);w=MW;}
      if(h>MH){w=Math.round(w*MH/h);h=MH;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',Q));
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

let _eAccId=null,_accImgs=[],_accAtts=[];

async function renderAccList(){
  var db=await loadDB(),el=document.getElementById('acc-list');
  if(!db.accessories.length){el.innerHTML='<div class="empty">暂无配件，点击"新增配件"添加</div>';return;}
  el.innerHTML=db.accessories.map(function(a){
    var img=a.images&&a.images.length?'<img src="'+a.images[0]+'" style="width:56px;height:48px;object-fit:contain;border:1px solid #e5e5e5;margin-right:12px;flex-shrink:0;">':'<div style="width:56px;height:48px;background:#f5f5f5;margin-right:12px;flex-shrink:0;border:1px solid #f0f0f0;"></div>';
    return '<div class="card"><div class="card-header"><div style="display:flex;align-items:center;">'+img+'<div><span class="card-title">'+a.nameZh+'</span><span style="color:#888;font-size:12px;margin-left:6px;">/ '+a.nameEn+'</span>'+(a.brand?'<span style="font-size:10px;background:#000;color:#fff;padding:1px 6px;margin-left:4px;">'+a.brand+'</span>':'')+(a.partNo?'<div style="font-size:11px;color:#aaa;">料号: '+a.partNo+'</div>':'')+'</div></div><div class="card-actions"><button class="btn btn-sm" onclick="openAccModal(''+a.id+'')">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteAcc(''+a.id+'')">删除</button></div></div><div style="font-size:12px;color:#666;display:flex;gap:20px;flex-wrap:wrap;"><span>重量: <b>'+(a.weight||'—')+'</b> kg</span><span>价格: <b>'+(a.price>0?'€'+Number(a.price).toFixed(2):'—')+'</b></span>'+(a.description?'<span style="color:#aaa;">'+a.description.substring(0,80)+'</span>':'')+'</div>'+(a.attachments&&a.attachments.length?'<div style="margin-top:6px;">'+a.attachments.map(function(at){return '<a href="'+at.url+'" target="_blank" style="font-size:11px;color:#555;margin-right:8px;">📎 '+at.name+'</a>';}).join('')+'</div>':'')+'</div>';
  }).join('');

async function openAccModal(id){
  try {
    _eAccId=id||null;_accImgs=[];_accAtts=[];
    var db=await loadDB(),a=id?db.accessories.find(function(x){return x.id===id;}):null;
    document.getElementById('accModalTitle').textContent=id?'编辑配件':'新增配件';
    document.getElementById('acc-partNo').value=a?(a.partNo||''):'';
    document.getElementById('acc-nameZh').value=a?(a.nameZh||''):'';
    document.getElementById('acc-nameEn').value=a?(a.nameEn||''):'';
    document.getElementById('acc-weight').value=a?(a.weight||''):'';
    document.getElementById('acc-price').value=a?(a.price||''):'';
    document.getElementById('acc-desc').value=a?(a.description||''):'';
    document.getElementById('acc-brand').value=a?(a.brand||''):'';
    _accImgs=a&&a.images?[...a.images]:[];

}
function closeAccModal(){document.getElementById('accModal').classList.remove('open');}

function uploadAccImages(ev){
  var files=Array.from(ev.target.files);ev.target.value='';
  Promise.all(files.map(function(f){return compressImage(f).then(function(d){if(d){_accImgs.push(d);renderAccImgs();}});}));
}
function renderAccImgs(){document.getElementById('acc-images').innerHTML=_accImgs.map(function(s,i){return '<div class="img-thumb"><img src="'+s+'"><button class="del-img" onclick="removeAccImg('+i+')">x</button></div>';}).join('');}
function removeAccImg(i){_accImgs.splice(i,1);renderAccImgs();}
function addAccAttach(){var n=document.getElementById('acc-aname').value.trim(),u=document.getElementById('acc-aurl').value.trim();if(!n&&!u)return;_accAtts.push({name:n||u,url:u||n});document.getElementById('acc-aname').value='';document.getElementById('acc-aurl').value='';renderAccAtts();}
function renderAccAtts(){document.getElementById('acc-alist').innerHTML=_accAtts.map(function(a,i){return '<div class="attach-item"><a href="'+a.url+'" target="_blank">'+a.name+'</a><button class="btn-icon" onclick="removeAccAtt('+i+')">x</button></div>';}).join('');}
function removeAccAtt(i){_accAtts.splice(i,1);renderAccAtts();}

async function saveAcc(){
  var db=await loadDB();
  var nameZh=document.getElementById('acc-nameZh').value.trim();
  if(!nameZh){showToast('请填写名称（中文）',1);return;}
  var data={id:_eAccId||('acc_'+uid()),partNo:document.getElementById('acc-partNo').value.trim(),nameZh:nameZh,nameEn:document.getElementById('acc-nameEn').value.trim(),imgKey:'',images:_accImgs,weight:parseFloat(document.getElementById('acc-weight').value)||0,price:parseFloat(document.getElementById('acc-price').value)||0,description:document.getElementById('acc-desc').value.trim(),brand:document.getElementById('acc-brand').value,attachments:_accAtts};
  if(_eAccId){var idx=db.accessories.findIndex(function(a){return a.id===_eAccId;});if(idx!==-1){data.imgKey=db.accessories[idx].imgKey||'';db.accessories[idx]=data;}}
  else db.accessories.push(data);
  if(await saveDB(db)){showToast(_eAccId?'配件已更新':'配件已添加');closeAccModal();renderAccList();}
}
async function deleteAcc(id){
  if(!confirm('确定删除？'))return;
  var db=await loadDB();db.accessories=db.accessories.filter(function(a){return a.id!==id;});
  if(await saveDB(db)){showToast('已删除');renderAccList();}
}

function closeAccDetail(){document.getElementById('accDetail').style.display='none';}

/* ── Import / Export ── */
async function exportDB(){
  var db=await loadDB();
  var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='pvstar_data.json';a.click();URL.revokeObjectURL(url);
  showToast('已导出 pvstar_data.json');
}
function importDB(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var db=JSON.parse(e.target.result);
      if(!db.accessories||!db.packages)throw new Error('格式错误');
      if(!confirm('导入将覆盖当前数据，确定？'))return;
      saveDB(db).then(function(ok){
        if(ok){showToast('导入成功: '+db.accessories.length+'个配件, '+db.packages.length+'个配件包');renderAccList();renderPkgList();}
      });
    }catch(err){showToast('导入失败: '+err.message,1);}
  };
  r.readAsText(f);ev.target.value='';
}


/* ── Clear / reset DB ── */
async function clearDB(){
  if(!confirm('确定要清除所有数据并恢复默认？此操作不可撤销！'))return;
  try{
    var idb=await openIDB();
    await new Promise(function(resolve,reject){
      var req=idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY);
      req.onsuccess=resolve; req.onerror=function(e){reject(e.target.error);};
    });
    showToast('已重置为默认数据');
    await renderAccList();
    renderPkgList();
  }catch(e){showToast('重置失败: '+e.message,1);}
}
